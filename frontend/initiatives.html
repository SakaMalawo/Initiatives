<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiatives - Citizen Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased">
    <!-- Navigation -->
    <nav class="glass m-6 p-5 flex justify-between items-center sticky top-6 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <a href="index.html" class="text-2xl font-extrabold tracking-tight text-white">Citizen<span class="text-blue-400">Platform</span></a>
        </div>
        <div class="hidden md:flex items-center space-x-8">
            <a href="index.html" class="nav-link text-gray-300 hover:text-white font-medium">Accueil</a>
            <a href="initiatives.html" class="nav-link text-white font-medium">Initiatives</a>
            <a href="dashboard.html" class="nav-link text-gray-300 hover:text-white font-medium">Tableau de bord</a>
            <a href="create-initiative.html" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold btn-animate shadow-lg shadow-blue-600/20">
                Proposer
            </a>
            <div id="userMenu" class="hidden">
                <a href="profile.html" class="text-gray-300 hover:text-white font-medium">Mon profil</a>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 font-medium">Déconnexion</button>
            </div>
            <div id="authButtons">
                <a href="login.html" class="text-gray-300 hover:text-white font-medium">Connexion</a>
                <a href="register.html" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold btn-animate shadow-lg shadow-blue-600/20">
                    S'inscrire
                </a>
            </div>
        </div>
    </nav>

    <!-- Filters -->
    <main class="container mx-auto px-6 py-8">
        <div class="glass p-6 mb-8 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex flex-wrap gap-4">
                <select id="categoryFilter" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-all">
                    <option value="">Toutes les catégories</option>
                </select>
                <select id="zoneFilter" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-all">
                    <option value="">Toutes les zones</option>
                </select>
                <select id="statusFilter" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-all">
                    <option value="">Tous les statuts</option>
                    <option value="PROPOSED">Proposées</option>
                    <option value="VALIDATED">Validées</option>
                    <option value="IN_PROGRESS">En cours</option>
                    <option value="COMPLETED">Réalisées</option>
                </select>
            </div>
            <button onclick="loadInitiatives()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold btn-animate">
                Filtrer
            </button>
        </div>

        <!-- Initiatives Grid -->
        <div id="initiativesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Initiatives will be loaded here -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/initiatives.js"></script>
</body>
</html>
