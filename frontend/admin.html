<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Citizen Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased">
    <!-- Navigation -->
    <nav class="glass m-6 p-5 flex justify-between items-center sticky top-6 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-white">Admin<span class="text-red-400">Panel</span></span>
        </div>
        <div class="hidden md:flex items-center space-x-8">
            <a href="dashboard.html" class="nav-link text-gray-300 hover:text-white font-medium">Tableau de bord</a>
            <a href="profile.html" class="nav-link text-gray-300 hover:text-white font-medium">Mon profil</a>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 font-medium">Déconnexion</button>
        </div>
    </nav>

    <!-- Admin Panel -->
    <main class="container mx-auto px-6 py-8">
        <!-- Tabs -->
        <div class="glass p-2 mb-8 flex space-x-2">
            <button onclick="showTab('initiatives')" class="tab-btn flex-1 py-3 rounded-xl text-white font-medium transition-all bg-blue-600" data-tab="initiatives">Initiatives</button>
            <button onclick="showTab('comments')" class="tab-btn flex-1 py-3 rounded-xl text-gray-400 font-medium transition-all hover:bg-white/5" data-tab="comments">Commentaires</button>
            <button onclick="showTab('users')" class="tab-btn flex-1 py-3 rounded-xl text-gray-400 font-medium transition-all hover:bg-white/5" data-tab="users">Utilisateurs</button>
        </div>

        <!-- Initiatives Tab -->
        <div id="initiativesTab" class="tab-content">
            <div class="glass p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Gestion des initiatives</h2>
                <div id="adminInitiatives" class="space-y-4">
                    <!-- Initiatives will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Comments Tab -->
        <div id="commentsTab" class="tab-content hidden">
            <div class="glass p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Modération des commentaires</h2>
                <div id="adminComments" class="space-y-4">
                    <!-- Comments will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content hidden">
            <div class="glass p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Gestion des utilisateurs</h2>
                <div id="adminUsers" class="space-y-4">
                    <!-- Users will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
