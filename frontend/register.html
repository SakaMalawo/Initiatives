<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Citizen Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased">
    <!-- Navigation -->
    <nav class="glass m-6 p-5 flex justify-between items-center sticky top-6 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <a href="index.html" class="text-2xl font-extrabold tracking-tight text-white">Citizen<span class="text-blue-400">Platform</span></a>
        </div>
        <div class="hidden md:flex items-center space-x-8">
            <a href="index.html" class="nav-link text-gray-300 hover:text-white font-medium">Accueil</a>
            <a href="initiatives.html" class="nav-link text-gray-300 hover:text-white font-medium">Initiatives</a>
            <a href="#" class="nav-link text-gray-300 hover:text-white font-medium">À propos</a>
            <a href="login.html" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold btn-animate shadow-lg shadow-blue-600/20">
                Connexion
            </a>
        </div>
    </nav>

    <!-- Register Form -->
    <main class="container mx-auto px-6 py-16">
        <div class="max-w-md mx-auto">
            <div class="glass p-8">
                <h1 class="text-3xl font-bold text-white mb-2">Inscription</h1>
                <p class="text-gray-400 mb-8">Rejoignez la communauté citoyenne</p>

                <form id="registerForm" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-300 font-medium mb-2">Prénom</label>
                            <input type="text" id="firstName" required
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                placeholder="Jean">
                        </div>
                        <div>
                            <label class="block text-gray-300 font-medium mb-2">Nom</label>
                            <input type="text" id="lastName" required
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                placeholder="Dupont">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-300 font-medium mb-2">Email</label>
                        <input type="email" id="email" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                            placeholder="votre@email.com">
                    </div>
                    <div>
                        <label class="block text-gray-300 font-medium mb-2">Mot de passe</label>
                        <input type="password" id="password" required minlength="6"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                            placeholder="••••••••">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-300 font-medium mb-2">Ville</label>
                            <input type="text" id="city"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                placeholder="Paris">
                        </div>
                        <div>
                            <label class="block text-gray-300 font-medium mb-2">Code postal</label>
                            <input type="text" id="postalCode"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                placeholder="75001">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-300 font-medium mb-2">Téléphone (optionnel)</label>
                        <input type="tel" id="phone"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                            placeholder="06 12 34 56 78">
                    </div>
                    <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold btn-animate shadow-lg shadow-blue-600/20">
                        S'inscrire
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-400">Déjà inscrit ? <a href="login.html" class="text-blue-400 hover:text-blue-300 transition-colors">Se connecter</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Test script
        console.log('INLINE SCRIPT EXECUTED');
        alert('JavaScript fonctionne!');

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('FORM SUBMITTED');
            alert('Formulaire soumis!');

            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value
            };

            console.log('Data to send:', data);
            alert('Données: ' + JSON.stringify(data));

            // Test API call
            fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => {
                console.log('Response status:', r.status);
                alert('Réponse status: ' + r.status);
                return r.text();
            })
            .then(text => {
                console.log('Response body:', text);
                alert('Réponse: ' + text);
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Erreur: ' + err.message);
            });
        });
    </script>
</body>
</html>
