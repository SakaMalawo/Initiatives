<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Citizen Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased">
    <!-- Navigation -->
    <nav class="glass m-6 p-5 flex justify-between items-center sticky top-6 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <a href="index.html" class="text-2xl font-extrabold tracking-tight text-white">Citizen<span class="text-blue-400">Platform</span></a>
        </div>
        <div class="hidden md:flex items-center space-x-8">
            <a href="initiatives.html" class="nav-link text-gray-300 hover:text-white font-medium">Initiatives</a>
            <a href="dashboard.html" class="nav-link text-white font-medium">Tableau de bord</a>
            <a href="profile.html" class="nav-link text-gray-300 hover:text-white font-medium">Mon profil</a>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 font-medium">Déconnexion</button>
        </div>
    </nav>

    <!-- Dashboard -->
    <main class="container mx-auto px-6 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass p-6">
                <div class="text-blue-400 text-2xl font-bold" id="totalInitiatives">0</div>
                <div class="text-gray-400">Initiatives</div>
            </div>
            <div class="glass p-6">
                <div class="text-green-400 text-2xl font-bold" id="totalUsers">0</div>
                <div class="text-gray-400">Citoyens</div>
            </div>
            <div class="glass p-6">
                <div class="text-purple-400 text-2xl font-bold" id="totalVotes">0</div>
                <div class="text-gray-400">Votes</div>
            </div>
            <div class="glass p-6">
                <div class="text-orange-400 text-2xl font-bold" id="totalComments">0</div>
                <div class="text-gray-400">Commentaires</div>
            </div>
        </div>

        <!-- Top Initiatives -->
        <div class="glass p-8 mb-8">
            <h2 class="text-2xl font-bold text-white mb-6">Initiatives populaires</h2>
            <div id="topInitiatives" class="space-y-4">
                <!-- Top initiatives will be loaded here -->
            </div>
        </div>

        <!-- Stats by Status -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Par statut</h2>
                <div id="statusStats" class="space-y-4">
                    <!-- Status stats will be loaded here -->
                </div>
            </div>
            <div class="glass p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Par catégorie</h2>
                <div id="categoryStats" class="space-y-4">
                    <!-- Category stats will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
