<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail Initiative - Citizen Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased">
    <!-- Navigation -->
    <nav class="glass m-6 p-5 flex justify-between items-center sticky top-6 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <a href="index.html" class="text-2xl font-extrabold tracking-tight text-white">Citizen<span class="text-blue-400">Platform</span></a>
        </div>
        <div class="hidden md:flex items-center space-x-8">
            <a href="initiatives.html" class="nav-link text-gray-300 hover:text-white font-medium">← Retour</a>
        </div>
    </nav>

    <!-- Initiative Detail -->
    <main class="container mx-auto px-6 py-8">
        <div id="initiativeDetail" class="max-w-4xl mx-auto">
            <!-- Initiative will be loaded here -->
        </div>

        <!-- Comments Section -->
        <div class="max-w-4xl mx-auto mt-12">
            <div class="glass p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Commentaires</h2>
                
                <div id="commentForm" class="hidden mb-8">
                    <textarea id="commentContent" rows="3"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                        placeholder="Partagez votre avis..."></textarea>
                    <button onclick="addComment()" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold btn-animate">
                        Publier
                    </button>
                </div>

                <div id="commentsList" class="space-y-4">
                    <!-- Comments will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/initiative-detail.js"></script>
</body>
</html>
